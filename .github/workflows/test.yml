name: test

# Quality gate — build + unit + synthetic-fixture e2e. Runs on every push to
# main/dev and on PRs. `quality-gates` is the required check on main.
# Runs on the infra ci-runner fleet (repo lane: ak5/ai-session-analyzer,
# plain labels — no docker needed for pnpm build/test).

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: [self-hosted, cirunner]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # tsc -b project references + esbuild CLI bundle
      - run: pnpm test # unit suite
      - run: pnpm e2e:setup --synthetic # format-faithful fixtures, no auth
      - run: pnpm test:e2e # drives the built asa binary end-to-end

  # main only accepts PRs from dev. Branch protection can't enforce a PR's SOURCE
  # branch — only that a check passes — so fail loudly when a non-dev branch
  # targets main (feature branches land on dev first, then dev → main).
  main-from-dev:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref != 'dev' }}
    runs-on: [self-hosted, cirunner]
    steps:
      - run: 'echo "::error::main only accepts PRs from dev (got ${{ github.head_ref }})"; exit 1'
